base {
    archivesName = mod_id
}

neoForge {
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

dependencies {
    implementation "me.fzzyhmstrs:fzzy_config:0.7.3+1.21+neoforge"

    // Exposed as api so the client and server subprojects inherit them transitively.
    api "aztech:Modern-Industrialization:${modern_industrialization_version}"
    api "software.bernie.geckolib:geckolib-neoforge-${minecraft_version}:${geckolibVersion}"
    api files("jars/AgriCraft-neoforge-1.21.1-4.0.8.jar")

    implementation "dev.technici4n:GrandPower:${grandpower_version}"
    implementation "me.shedaniel.cloth:cloth-config-neoforge:${cloth_config_version}"

    implementation "curse.maven:rhino-416294:7104526"
    implementation "curse.maven:guideme-1173950:6812025"
    implementation files("jars/silent-gear-1.21.1-neoforge-4.0.28.1.jar")
    implementation files("jars/silent-lib-1.21.1-neoforge-10.5.1.jar")
    implementation files("jars/adastra-1.21.1-1.16.6-neoforge.jar")

    // compileOnly: NanoArmorMixin implements FluidProvider from common_storage_lib.
    // Provided at runtime by the common_storage_lib mod, so not bundled.
    // FluidResource and other API types live in nested jar-in-jar modules that
    // Gradle won't unpack from the main jar, so they're referenced explicitly.
    compileOnly files("jars/common-storage-lib-neoforge-1.21.1-0.0.9.jar")
    compileOnly files("jars/common-storage-lib-resources-neoforge-1.21.1-0.0.9.jar")
    compileOnly files("jars/common-storage-lib-data-neoforge-1.21.1-0.0.9.jar")
    compileOnly files("jars/common-storage-lib-lookup-neoforge-1.21.1-0.0.9.jar")

    jarJar(implementation("io.github.llamalad7:mixinextras-neoforge:${mixinextras_version}")) {
        version {
            strictly "[${mixinextras_version},)"
            prefer mixinextras_version
        }
    }

    implementation "curse.maven:tesseract-api-neoforge-1067672:7796728"
    implementation "curse.maven:kubejs-238086:7143884"
    implementation "curse.maven:mi-tweaks-1068413:7722383"
    implementation "curse.maven:extended-industrialization-1068418:7722451"
    implementation "curse.maven:crafttweaker-239197:6929483"

    api jarJar("dev.technici4n:GrandPower:${project.grandpower_version}")

    implementation("com.lowdragmc.ldlib2:ldlib2-neoforge-${minecraft_version}:${ldlib2_version}:all")

    implementation "curse.maven:architectury-api-419699:5786327"
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [minecraft_version      : minecraft_version,
                             minecraft_version_range: minecraft_version_range,
                             neo_version            : neo_version,
                             neo_version_range      : neo_version_range,
                             loader_version_range   : loader_version_range,
                             mod_id                 : mod_id,
                             mod_name               : mod_name,
                             mod_license            : mod_license,
                             mod_version            : mod_version,
                             mod_authors            : mod_authors,
                             mod_description        : mod_description]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata
