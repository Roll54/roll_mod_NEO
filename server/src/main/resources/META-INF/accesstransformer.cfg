# roll_mod_server — access widening for the per-world threading coremod.
# Plan: ~/.claude/plans/how-hard-is-to-wiggly-goblet.md (Stage 0 — infra & access).
#
# These fields are private in vanilla but are needed to bind each ServerLevel to its
# own tick thread and to reroute the chunk-source main-thread executor. Widening is a
# no-op at runtime (no behavior change); it only relaxes access for later stages.

# The server's dimension map — iterated to spawn/join one WorldThread per level.
public net.minecraft.server.MinecraftServer levels

# Each level's chunk-source main-thread executor + its bound thread. The threading
# system rebinds these so chunk-system callbacks run on the owning world's thread.
public net.minecraft.server.level.ServerChunkCache mainThreadProcessor
public net.minecraft.server.level.ServerChunkCache mainThread

# Per-world level data (time) and entity manager — touched during per-world ticking
# and the independent-time work in Stage 4.
public net.minecraft.server.level.ServerLevel serverLevelData
public net.minecraft.server.level.ServerLevel entityManager
